<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CorePay Withdraw</title>

<style>
body{
margin:0;
background:linear-gradient(135deg,#0f172a,#111827,#0b1020);
font-family:system-ui,-apple-system,Segoe UI,Roboto;
color:white;
}

.card{
max-width:420px;
margin:80px auto;
background:rgba(17,24,39,.9);
padding:30px;
border-radius:26px;
box-shadow:0 30px 80px rgba(0,0,0,.6);
}

button{
background:linear-gradient(90deg,#22c55e,#6366f1);
border:none;
color:white;
padding:12px;
border-radius:16px;
cursor:pointer;
width:100%;
margin-top:12px;
font-weight:600;
transition:.3s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 12px 30px rgba(99,102,241,.4);
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
background:#0f172a;
border:1px solid #1e293b;
border-radius:14px;
color:white;
}

.err{
color:#f87171;
font-size:13px;
margin-top:10px;
}
</style>
</head>
<body>

<div class="card">
<h3>Withdraw Funds</h3>

<select id="coin">
<option>BTC</option>
<option>ETH</option>
<option>TRX</option>
<option>SOL</option>
<option>BNB</option>
</select>

<input id="addr" placeholder="Destination wallet">
<input id="amt" placeholder="Amount">
<button onclick="withdraw()">Withdraw</button>

<p id="msg" class="err"></p>
</div>

<script>
/* ORIGINAL SCRIPT UNCHANGED */
const wallet=localStorage.wallet;
const key="corepay_"+wallet;
let data=JSON.parse(localStorage.getItem(key));

function save(){localStorage.setItem(key,JSON.stringify(data));}

function withdraw(){
 let a=parseFloat(amt.value);
 let c=coin.value;
 if(!a||a<=0||data.balances[c]<a){
   msg.innerText="Insufficient balance";
   return;
 }
 data.balances[c]-=a;
 data.withdrawals.push({coin:c,amount:a,time:Date.now()});
 data.history.unshift(`Withdraw -$${a.toFixed(2)} (${c})`);
 save();
 msg.innerText="Withdrawal submitted";
 setTimeout(()=>location.href="home.html",2000);
}
</script>

</body>
</html>
