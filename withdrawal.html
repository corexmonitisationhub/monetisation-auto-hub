<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CoreX Xchange Withdrawal</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,0.08);
  padding:30px;
  border-radius:20px;
  width:360px;
  box-shadow:0 15px 40px rgba(0,0,0,.4);
}
input,select{
  width:100%;
  padding:12px;
  margin:10px 0;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:12px;
  color:white;
}
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  background:linear-gradient(90deg,#6366f1,#8b5cf6);
  color:white;
  font-weight:700;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="card">
<h2>CoreX Xchange Withdrawal</h2>
<select>
<option>BTC</option>
<option>SOL</option>
<option>TRX</option>
</select>
<input placeholder="Amount">
<input placeholder="Destination wallet">
<button onclick="location='home.html'">Submit Withdrawal</button>
</div>

</body>
</html>
