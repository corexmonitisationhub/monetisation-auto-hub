<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoreXTradeX Login</title>

<style>
body{
  margin:0;
  background:#0b0f14;
  font-family:system-ui;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

.card{
  width:90%;
  max-width:400px;
  padding:25px;
  border-radius:18px;
  background:#111827;
  box-shadow:0 0 30px rgba(0,0,0,.4);
  text-align:center;
}

input,select{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #263041;
  background:#0b0f14;
  color:white;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#22c55e;
  color:white;
  font-weight:700;
  cursor:pointer;
}

#errorMsg{
  display:none;
  color:#f6465d;
  font-size:12px;
}

.loader-screen{
  position:fixed;
  inset:0;
  background:#0b0f14;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.spinner{
  border:5px solid #263041;
  border-top:5px solid #22c55e;
  border-radius:50%;
  width:60px;
  height:60px;
  animation:spin 1s linear infinite;
  margin-bottom:15px;
}

@keyframes spin{
  100%{transform:rotate(360deg);}
}
</style>
</head>
<body>

<div class="card">
<h2>CoreXTradeX</h2>

<form id="loginForm">
<select id="cryptoSelect" required>
<option value="">Select Crypto</option>
<option value="BTC">BTC</option>
<option value="USDT">USDT (TRC20)</option>
<option value="TRX">TRX</option>
<option value="SOL">SOL</option>
<option value="BNB">BNB</option>
<option value="ETH">ETH</option>
</select>

<input id="wallet" placeholder="Wallet Address" required>
<div id="errorMsg">Invalid wallet address.</div>

<button type="submit">Enter Dashboard</button>
</form>
</div>

<div class="loader-screen" id="loaderScreen">
<div class="spinner"></div>
<p>Verifying Details...</p>
</div>

<script>
const walletPatterns={
BTC:/^[13][a-km-zA-HJ-NP-Z1-9]{25,34}$/,
ETH:/^0x[a-fA-F0-9]{40}$/,
BNB:/^0x[a-fA-F0-9]{40}$/,
TRX:/^T[a-zA-Z0-9]{33}$/,
USDT:/^T[a-zA-Z0-9]{33}$/,
SOL:/^[1-9A-HJ-NP-Za-km-z]{32,44}$/
};

function validateWallet(a,c){
return walletPatterns[c]&&walletPatterns[c].test(a);
}

document.getElementById("loginForm").addEventListener("submit",function(e){
e.preventDefault();
let wallet=document.getElementById("wallet").value.trim();
let crypto=document.getElementById("cryptoSelect").value;

if(!validateWallet(wallet,crypto)){
document.getElementById("errorMsg").style.display="block";
return;
}

localStorage.wallet=wallet;
document.getElementById("loaderScreen").style.display="flex";

setTimeout(()=>location="home.html",6000);
});
</script>
</body>
</html>
