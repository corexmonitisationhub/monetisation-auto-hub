<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CorePay Activation Sandbox</title>
<style>
body{
  margin:0;
  font-family:system-ui;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
  opacity:0;
  transition:.3s;
}

.center{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card{
  background:#1f2937;
  padding:40px;
  border-radius:20px;
  width:360px;
  text-align:center;
  box-shadow:0 8px 30px rgba(0,0,0,0.5);
}

h2{margin:10px 0;}

input,select{
  width:100%;
  padding:14px;
  margin:10px 0;
  background:#111827;
  border:1px solid #334155;
  border-radius:12px;
  color:white;
}

button{
  width:100%;
  padding:15px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:#F3BA2F;
  color:white;
  font-weight:700;
  cursor:pointer;
  transition:.3s;
}
button:hover{opacity:.9;}

.logo{width:160px;margin-bottom:15px;}

/* POPUP STYLES */
.pop{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
  justify-content:center;
  align-items:center;
  z-index:999;
}

.box{
  background:#1f2937;
  padding:30px;
  border-radius:16px;
  width:330px;
  text-align:center;
}

.scan{
  width:120px;
  height:120px;
  border-radius:50%;
  border:4px solid #F3BA2F;
  margin:20px auto;
  animation:scan 2s infinite linear;
}

@keyframes scan{100%{transform:rotate(360deg);}}

.bar{
  height:8px;
  background:#334155;
  border-radius:8px;
  margin-top:15px;
}

.fill{
  height:100%;
  width:0;
  background:#F3BA2F;
}

.loadingOverlay{
  display:none;
  position:fixed;
  inset:0;
  background: rgba(15,23,42,0.95);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  color:white;
  text-align:center;
  font-size:22px;
}

.loadingDots span{
  animation:dot 1.4s infinite linear;
  display:inline-block;
}
.loadingDots span:nth-child(1){animation-delay:0s;}
.loadingDots span:nth-child(2){animation-delay:.2s;}
.loadingDots span:nth-child(3){animation-delay:.4s;}
@keyframes dot{0%,80%,100%{transform:scale(0);}40%{transform:scale(1);}}
</style>
</head>
<body>
<div class="center">
  <div class="card">
    <img src="logo.png" class="logo">
    <h2>CorePay Activation Sandbox</h2>
    <select id="net">
      <option>TRX</option>
      <option>BTC</option>
      <option>ERC</option>
      <option>BNB</option>
      <option>SOL</option>
    </select>
    <input id="addr" placeholder="Wallet address">
    <button id="loginBtn">Secure Login</button>
  </div>
</div>

<!-- fingerprint pop -->
<div class="pop" id="fingerPop">
  <div class="box">
    <h3 id="scanTitle">Wallet Address Connecting</h3>
    <div class="scan"></div>
    <p id="scanText">Scanning wallet verification and identity...</p>
  </div>
</div>

<!-- approval pop -->
<div class="pop" id="approvePop">
  <div class="box">
    <h3>Wallet Approval</h3>
    <p>Approve secure connection</p>
    <button id="approveBtn">Approve</button>
  </div>
</div>

<!-- email pop -->
<div class="pop" id="emailPop">
  <div class="box">
    <h3>Email Verification</h3>
    <div id="email1">
      <input id="email" placeholder="Email">
      <button id="sendEmailBtn">Send Code</button>
    </div>
    <div id="emailBarBox" style="display:none">
      <p id="emailStatus">Sending encrypted mail…</p>
      <div class="bar"><div class="fill" id="emailBar"></div></div>
    </div>
    <div id="email2" style="display:none">
      <input id="ecode" placeholder="Enter code">
      <button id="verifyCodeBtn">Verify</button>
    </div>
  </div>
</div>

<div class="loadingOverlay" id="loadingOverlay">
  <h3>Loading CorePay Dashboard<span class="loadingDots"><span>.</span><span>.</span><span>.</span></span></h3>
</div>

  const emailPop = document.getElementById("emailPop");
  const email1 = document.getElementById("email1");
  const email2 = document.getElementById("email2");
  const emailBarBox = document.getElementById("emailBarBox");
  const emailBar = document.getElementById("emailBar");
  const emailStatus = document.getElementById("emailStatus");
  const ecode = document.getElementById("ecode");
